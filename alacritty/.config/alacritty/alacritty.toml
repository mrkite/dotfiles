[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[window]
dynamic_padding = true
decorations = "None"

[window.class]
instance = "Alacritty"
general = "Alacritty"

[scrolling]
history = 0

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "0x2e3440"
foreground = "0xd8dee9"

[colors.normal]
black = "0x3b4252"
red = "0xbf616a"
green = "0xa3be8c"
yellow = "0xebcb8b"
blue = "0x81a1c1"
magenta = "0xb48ead"
cyan = "0x88c0d0"
white = "0xe5e9f0"

[colors.bright]
black = "0x4c566a"
red = "0xbf616a"
green = "0xa3be8c"
yellow = "0xebcb8b"
blue = "0x81a1c1"
magenta = "0xb48ead"
cyan = "0x8fbcbb"
white = "0xeceff4"

[font]
size = 12

[font.normal]
family = "monospace"
style = "Regular"

[font.bold]
family = "monospace"
style = "Bold"

[font.italic]
family = "monospace"
style = "Italic"

[font.bold_italic]
family = "monospace"
style = "Bold Italic"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

[cursor]
style = "Underline"
vi_mode_style = "None"
unfocused_hollow = true
thickness = 0.15

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"

[keyboard]
[[keyboard.bindings]]
key = "Paste"
action = "Paste"

[[keyboard.bindings]]
key = "Copy"
action = "Copy"

[[keyboard.bindings]]
key = "L"
mods = "Control"
action = "ClearLogNotice"

[[keyboard.bindings]]
key = "L"
mods = "Control"
mode = "~Vi"
chars = "\f"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[terminal]
shell = { program = "tmux", args = ["new", "-t", "main"] }
